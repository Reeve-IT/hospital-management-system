<!DOCTYPE html>
<html>

<head>
    <title>Doctor Dashboard</title>
</head>

<body>

<h1>Doctor Dashboard</h1>

<a href="/logout/">Logout</a>

<hr>

<h2>Add Availability</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">

Add Slot

</button>

</form>

<hr>

<h2>Your Slots</h2>

<ul>

{% for slot in slots %}

<li>

{{ slot.date }}

{{ slot.start_time }}

-

{{ slot.end_time }}

|

Booked:

{{ slot.is_booked }}

</li>

{% empty %}

<li>No slots yet.</li>

{% endfor %}

</ul>

</body>

</html>
